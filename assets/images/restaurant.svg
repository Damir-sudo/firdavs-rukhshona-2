<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="rbg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7a1320"/>
      <stop offset="100%" stop-color="#3a070d"/>
    </linearGradient>
    <linearGradient id="rgold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#f6e7a8"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#rbg)"/>
  <rect x="50" y="50" width="1100" height="800" fill="none" stroke="url(#rgold)" stroke-width="2" opacity="0.5" rx="8"/>
  <!-- Building silhouette -->
  <g opacity="0.7">
    <rect x="350" y="380" width="500" height="320" fill="#2c0509" stroke="url(#rgold)" stroke-width="2"/>
    <polygon points="320,380 600,220 880,380" fill="#4a0a12" stroke="url(#rgold)" stroke-width="2"/>
    <!-- Doors -->
    <rect x="545" y="510" width="110" height="190" rx="55" fill="url(#rgold)" opacity="0.6"/>
    <!-- Windows -->
    <rect x="400" y="440" width="80" height="100" rx="4" fill="#1a0305" stroke="url(#rgold)" stroke-width="1.5" opacity="0.7"/>
    <rect x="720" y="440" width="80" height="100" rx="4" fill="#1a0305" stroke="url(#rgold)" stroke-width="1.5" opacity="0.7"/>
    <!-- Dome accent -->
    <circle cx="600" cy="280" r="22" fill="url(#rgold)" opacity="0.8"/>
  </g>
  <text x="600" y="780" font-family="Georgia, serif" font-size="42" fill="url(#rgold)" text-anchor="middle" letter-spacing="6">FOTIMA SULTON</text>
  <text x="600" y="830" font-family="Georgia, serif" font-size="18" fill="#f6e7a8" text-anchor="middle" letter-spacing="4" opacity="0.5">Загрузите restaurant.jpg</text>
</svg>
